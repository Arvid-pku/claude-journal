name: Build & Release

on:
  push:
    tags: ['v*']

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: mac
            artifact: "tray/dist/*.dmg"
          - os: windows-latest
            target: win
            artifact: "tray/dist/*.exe"
          - os: ubuntu-latest
            target: linux
            artifact: "tray/dist/*.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install app dependencies
        run: npm install --omit=dev

      - name: Install tray dependencies
        working-directory: tray
        run: npm install

      - name: Build
        working-directory: tray
        run: npx electron-builder --${{ matrix.target }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claude-journal-${{ matrix.target }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Install

            **Recommended:**
            ```bash
            npm install -g claude-journal
            claude-journal --daemon --port 5249
            ```

            **[Interactive Guide](https://arvid-pku.github.io/claude-journal/)** | **Desktop app downloads below.**

            ### macOS note
            The .dmg is not code-signed. macOS will show "damaged" or "unidentified developer". Run this after installing:
            ```
            xattr -cr "/Applications/Claude Journal.app"
            ```
            Then open the app again.

            ### Linux
            Make the AppImage executable: `chmod +x Claude-Journal-*.AppImage`
